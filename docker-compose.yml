version: "3.9"

# LOCAL DEVELOPMENT — uses the all-in-one Dockerfile at the repo root.
# For production on Unraid, use the GHCR image directly (see README.md).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doyle-financial-planner
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data    # SQLite database — back up this folder regularly
    environment:
      - DATABASE_URL=sqlite:////app/data/financial_planner.db
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - FX_CAD_USD=${FX_CAD_USD:-1.3650}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
