name: Build & Publish Docker Image

# Triggers: every push to main (auto) or manually from GitHub Actions tab
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # → ghcr.io/seaniedire/doyle-financial-planner
  # Silence the "Node.js 20 is deprecated" warning — these actions already
  # support Node 24; the runner will migrate automatically in June 2026.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Gate: tests must pass before the image is built ──────────────────────────
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt pytest pytest-cov

      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v --tb=short
        env:
          DATABASE_URL: "sqlite:///:memory:"
          ANTHROPIC_API_KEY: "test-key-not-real"

  lint-frontend:
    name: Frontend type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: TypeScript check
        run: cd frontend && npx tsc --noEmit

  # ── Build: only runs when both test jobs pass ─────────────────────────────────
  build-and-push:
    name: Build & push to GHCR
    runs-on: ubuntu-latest
    needs: [test, lint-frontend]
    permissions:
      contents: read
      packages: write    # required to push to ghcr.io

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # ── Must come BEFORE login and build ──────────────────────────────────────
      # Sets up a buildx builder using the docker-container driver, which is
      # required for the GitHub Actions cache backend (type=gha).
      # The default "docker" driver does NOT support GHA caching.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # automatically available, no config needed

      - name: Extract image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Always push "latest" — this is what Unraid's "Check for Updates" watches
            type=raw,value=latest
            # Also tag with short SHA for rollback: ghcr.io/.../doyle-financial-planner:abc1234
            type=sha,prefix=,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache — dramatically speeds up repeat builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
