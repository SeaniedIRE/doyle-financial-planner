##
## Doyle Financial Planner — nginx config
## Security: OWASP Top 10 + ASVS L2
##

server {
    listen 8080;
    server_tokens off;   # Do not reveal nginx version (OWASP A05)

    # ─── Security headers ──────────────────────────────────────────────
    # OWASP A05 / ASVS V14.4

    # Prevent clickjacking (ASVS V14.4.2)
    add_header X-Frame-Options "DENY" always;

    # Prevent MIME-type sniffing (ASVS V14.4.3)
    add_header X-Content-Type-Options "nosniff" always;

    # Referrer policy — don't leak URL paths to third parties (ASVS V14.4.6)
    add_header Referrer-Policy "no-referrer" always;

    # NOTE: X-XSS-Protection is deprecated — modern browsers ignore or break it.
    # CSP (below) is the correct defence.

    # Permissions policy — disable unused browser features (ASVS V14.4.5)
    add_header Permissions-Policy
        "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()"
        always;

    # HSTS — enforce TLS (Cloudflare terminates TLS, but belt-and-suspenders)
    # 1 year max-age, include subdomains  (ASVS V9.1.1)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Content Security Policy (OWASP A03 XSS mitigation / ASVS V14.4.4)
    # Allows:
    #   - self: own origin
    #   - fonts.googleapis.com / fonts.gstatic.com: Google Fonts (if used)
    #   - data: for inline SVG icons (Vite bundles them as data URIs)
    #   - 'unsafe-inline' for style ONLY (Tailwind injects inline styles via class attrs)
    # No 'unsafe-eval' — Vite production builds do not need eval.
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
        always;

    # ─── Request limits  (OWASP A03 / ASVS V12.1.1) ──────────────────
    client_max_body_size 2m;    # 2 MiB max upload; FastAPI enforces 1 MiB separately

    # ─── React SPA ────────────────────────────────────────────────────
    location / {
        root /app/static;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache HTML for 5 minutes (SPA shell changes rarely)
        expires 5m;
        add_header Cache-Control "public, max-age=300, must-revalidate";
    }

    # Vite fingerprints assets — cache aggressively
    location /assets/ {
        root /app/static;
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    # ─── API proxy  ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Forward the Cloudflare Access JWT for optional app-level verification
        proxy_set_header CF-Access-JWT-Assertion $http_cf_access_jwt_assertion;
        proxy_set_header CF-Ray $http_cf_ray;

        proxy_read_timeout 120s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;

        # Strip internal headers before sending to backend
        proxy_set_header X-Powered-By "";
    }

    # ─── Health check (no auth, used by Unraid + Docker) ─────────────
    location /health {
        return 200 "ok";
        add_header Content-Type "text/plain";
        access_log off;
    }

    # ─── Block sensitive file access ─────────────────────────────────
    location ~ /\.(env|git|ht) {
        return 404;
        access_log off;
    }

    # ─── Gzip ────────────────────────────────────────────────────────
    gzip on;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/x-font-ttf font/opentype image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;
    gzip_proxied any;
}
